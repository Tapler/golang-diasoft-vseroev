version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: calendar-postgres
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calendar-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: calendar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - calendar-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: calendar-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - calendar-network

  migrations:
    image: alpine:3.18
    container_name: calendar-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    networks:
      - calendar-network
    command: >
      sh -c "
        apk add --no-cache postgresql-client curl &&
        curl -fsSL https://raw.githubusercontent.com/pressly/goose/master/install.sh | sh &&
        goose -dir /migrations postgres 'postgres://calendar:calendar@postgres:5432/calendar?sslmode=disable' up
      "

  calendar:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        LDFLAGS: "-X main.release=docker"
    container_name: calendar-api
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ../configs/config.docker.toml:/etc/calendar/config.toml:ro
    environment:
      CONFIG_FILE: /etc/calendar/config.toml
    networks:
      - calendar-network
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile.scheduler
      args:
        LDFLAGS: "-X main.release=docker"
    container_name: calendar-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ../configs/scheduler_config.docker.toml:/etc/calendar/scheduler_config.toml:ro
    environment:
      CONFIG_FILE: /etc/calendar/scheduler_config.toml
    networks:
      - calendar-network
    restart: unless-stopped

  storer:
    build:
      context: ..
      dockerfile: build/Dockerfile.storer
      args:
        LDFLAGS: "-X main.release=docker"
    container_name: calendar-storer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ../configs/storer_config.docker.toml:/etc/calendar/storer_config.toml:ro
    environment:
      CONFIG_FILE: /etc/calendar/storer_config.toml
    networks:
      - calendar-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  calendar-network:
    driver: bridge
